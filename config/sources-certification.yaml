# config/sources-certification.yaml
# 国际认证/评级体系映射。手工维护。
# 只列出持有至少一项国际背书的源；未列出的源不显示徽标。
# 徽标代号 allowlist（types.py 强校验）：
#   TNI   — Trusted News Initiative（BBC创办反虚假联盟，成员资格）
#   NG    — NewsGuard 评分 Green/高可信
#   AF    — Ad Fontes Media Bias Chart 高可靠性
#   MBFC  — Media Bias/Fact Check 事实报道 High
#   JTI   — Journalism Trust Initiative（RSF流程认证）
# key 必须与 config/config.yaml 的 name 字段值完全一致。

# ─── 强资质：≥3 项国际背书 ──────────────────────────
"BBC News":
  certifications: [TNI, NG, AF, MBFC]
  detail: "BBC 反虚假新闻联盟(TNI)创始成员；NewsGuard 高可信；Ad Fontes 高可靠；MBFC 事实报道 High"
  detail_en: "BBC is a founding TNI member; NewsGuard Green; Ad Fontes high reliability; MBFC High factual"

"AP News":
  certifications: [TNI, NG, AF, MBFC]
  detail: "美联社 TNI 成员；NewsGuard 高可信；Ad Fontes ~44.8/48；MBFC Least Biased/High"
  detail_en: "Associated Press TNI member; NewsGuard Green; Ad Fontes ~44.8/48; MBFC Least Biased/High"

"Reuters":
  certifications: [TNI, NG, AF, MBFC]
  detail: "路透社 TNI 成员；NewsGuard 高可信；Ad Fontes ~45/48；MBFC Least Biased/High"
  detail_en: "Reuters TNI member; NewsGuard Green; Ad Fontes ~45/48; MBFC Least Biased/High"

"Financial Times":
  certifications: [TNI, NG, AF, MBFC]
  detail: "金融时报 TNI 成员；NewsGuard 高可信；Ad Fontes 高；MBFC Least Biased/High"
  detail_en: "FT TNI member; NewsGuard Green; Ad Fontes high; MBFC Least Biased/High"

"The Hindu":
  certifications: [TNI, NG, AF, MBFC]
  detail: "印度 The Hindu TNI 成员；NewsGuard 高可信；Ad Fontes 高；MBFC High"
  detail_en: "The Hindu TNI member; NewsGuard Green; Ad Fontes high; MBFC High"

