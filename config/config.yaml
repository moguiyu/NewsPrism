# NewsPrism Configuration

# ─── SCHEDULE ──────────────────────────────────────────────────────────────────
schedule:
  # Collect every 4 hours — catches morning/lunch/evening news peaks in CST
  # and keeps up with US/EU news cycles without excessive dedup overhead
  collect_cron: "0 */4 * * *"   # every 4 hours: 00, 04, 08, 12, 16, 20
  publish_cron: "0 8 * * *"     # publish once daily at 08:00 (Europe/Warsaw = CET/CEST)
  timezone: "Europe/Warsaw"     # overridable via SCHEDULE_TIMEZONE env var

# ─── COLLECTION ────────────────────────────────────────────────────────────────
collection:
  max_age_hours: 6           # per-run: only fetch articles from last 6h
                             # (slightly over 4h interval to avoid gaps)
  request_timeout: 45        # increased: RSSHub routes (cankaoxiaoxi/caixin) need ~8-15s
  rate_limit_delay: 2.0      # seconds between requests to same domain
  retry_attempts: 3
  retry_backoff: 2.0

# ─── FILTERING ─────────────────────────────────────────────────────────────────
filter:
  keywords_file: "config/keywords.txt"
  min_topic_score: 0.1
  max_topics_per_article: 3

# ─── CLUSTERING ────────────────────────────────────────────────────────────────
clustering:
  semantic_threshold: 0.72
  strong_similarity_threshold: 0.86   # bypass title-overlap gate for very strong semantic matches
  coherence_title_ngram_threshold: 0.12
  time_window_hours: 48      # group articles within 48h window
  min_sources_for_multi: 2
  max_clusters_per_report: 20

  # Topic equivalence: treat these topic categories as semantically equivalent
  # for clustering purposes. Keys are canonical topics, values are topics that
  # should be treated as equivalent. Bidirectional and transitive.
  topic_equivalence:
    "World News": ["Geopolitics", "Regions", "Society"]
    "Geopolitics": ["World News", "Regions", "Energy & Climate (English)", "Geopolitics - Extended (English for international sources)"]
    "Tech-General": ["Tech Companies - International", "Tech Companies - China", "AI & LLM", "Smartphones & Electronics"]
    "Energy & Climate (English)": ["Geopolitics", "Society"]

# ─── DEDUPLICATION ─────────────────────────────────────────────────────────────
dedup:
  fuzzy_threshold: 85
  semantic_threshold: 0.82
  window_days: 3             # dedup window: don't repeat stories published 3+ days ago

# ─── AI SUMMARIZATION ──────────────────────────────────────────────────────────
summarizer:
  temperature: 0.3
  max_tokens: 1200
  language: "zh"
  style_guide_file: "config/style-guide.md"

# ─── OUTPUT ────────────────────────────────────────────────────────────────────
output:
  html_dir: "output"
  latest_symlink: true
  template: "design-premium"   # options: design-a | design-b | design-c | design-premium
  hot_topics:
    enabled: true
    max_topic_tabs: 3
    min_items_per_topic: 5
    candidate_window: 40
    history_window_days: 5
    storyline_relation_batch_size: 8
    max_pair_candidates: 200
    storyline_blocker_similarity: 0.54
    storyline_blocker_title_overlap: 0.06
    storyline_edge_confidence_threshold: 0.50
    storyline_history_similarity_threshold: 0.48
    storyline_admission_similarity: 0.64
    storyline_admission_title_overlap: 0.06
    cluster_validation_pair_similarity: 0.50
    cluster_validation_pair_title_overlap: 0.03
    cluster_validation_outlier_similarity: 0.58
    cluster_validation_outlier_title_overlap: 0.05
    tab_name_max_chars: 10
    icon_allowlist: ["globe", "war", "trade", "chip", "ai", "energy"]

# ─── ACTIVE SEARCH ────────────────────────────────────────────────────────────
active_search:
  telemetry_enabled: true
  result_max_age_hours: 72
  min_content_chars: 150
  max_results_per_region: 1
  min_query_token_overlap: 0.34
  min_cluster_title_overlap: 0.08
  max_existing_title_overlap: 0.82
  allow_unknown_freshness_for_official: false
  cost_tracking:
    billing:
      brightdata_serp:
        pricing_mode: per_result
        unit_cost_usd: 0.0015          # Bright Data SERP API pay-as-you-go: $1.5 / 1K results
        estimated_results_per_request: 4
      tavily_search:
        pricing_mode: per_request
        unit_cost_usd: 0.008           # Update to your live Tavily plan if it differs
      x_recent_search:
        pricing_mode: per_request
        unit_cost_usd: null            # Fill from the active X developer billing view
      x_user_lookup:
        pricing_mode: per_request
        unit_cost_usd: null            # Fill from the active X developer billing view
      x_user_timeline:
