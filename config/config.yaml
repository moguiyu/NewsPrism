# NewsPrism Configuration

# ─── SCHEDULE ──────────────────────────────────────────────────────────────────
schedule:
  # Full collection runs 4/day. A smaller pre-publish delta run catches
  # important morning updates without racing the 08:00 publish.
  full_collect_cron: "15 0,4,16,20 * * *"
  prepublish_collect_cron: "20 7 * * *"
  publish_cron: "30 7 * * *"    # build staged report before the 08:00 push
  push_cron: "0 8 * * *"        # deliver final page + Telegram at 08:00 sharp
  calibrate_cron: "30 3 * * 1"      # weekly Mon 03:30: nudge weights + refresh policy memory
  retention_cron: "0 4 * * 1"       # weekly Mon 04:00: drop unclustered articles >30d
  push_retry:
    enabled: true
    max_attempts: 3
    retry_interval_minutes: 5
  timezone: "Europe/Warsaw"     # overridable via SCHEDULE_TIMEZONE env var

# ─── EVOLUTION (P2) ─────────────────────────────────────────────────────────────
evolution:
  calibration:
    enabled: true
    training_window_days: 30
    max_step: 0.02          # per-week weight nudge magnitude
    weight_bounds: [0.3, 3.0]   # clamp as multiples of each dimension's seed
    min_feedback_to_run: 10
    policy_max_bullets: 10
  retention_days: 30

# ─── COLLECTION ────────────────────────────────────────────────────────────────
collection:
  full_max_age_hours: 8      # wider window for 4/day full runs
  delta_max_age_hours: 3     # tight morning catch-up window before publish
  request_timeout: 45        # increased: RSSHub routes (cankaoxiaoxi/caixin) need ~8-15s
  rate_limit_delay: 2.0      # seconds between requests to same domain
  retry_attempts: 3
  retry_backoff: 2.0

# ─── CLUSTERING ────────────────────────────────────────────────────────────────
clustering:
  semantic_threshold: 0.72
  strong_similarity_threshold: 0.86   # bypass title-overlap gate for very strong semantic matches
  coherence_title_ngram_threshold: 0.12
  time_window_hours: 48      # group articles within 48h window
  min_sources_for_multi: 2
  max_clusters_per_report: 20

# ─── DEDUPLICATION ─────────────────────────────────────────────────────────────
dedup:
  fuzzy_threshold: 85
  semantic_threshold: 0.82
  window_days: 3             # dedup window: don't repeat stories published 3+ days ago

# ─── AI SUMMARIZATION ──────────────────────────────────────────────────────────
summarizer:
  temperature: 0.3
  max_tokens: 1200
  language: "zh"
  style_guide_file: "config/style-guide.md"

# ─── OUTPUT ────────────────────────────────────────────────────────────────────
output:
  html_dir: "output"
  staging_dir: "output/staging"
  publish_complete_flag: ".publish_complete"
  latest_symlink: true
  english:
    enabled: true
  positive_energy:
    enabled: true
    min_items: 1
    max_items: 5
    min_confidence: 0.78
    candidate_min_items: 20
    target_items: 5
    empty_rate_target: 0.05
    source_diversity: true
    use_llm_classifier: false
  day_navigation:
    days: 3
  hot_topics:
    enabled: true
    # Cap of 3 storyline tabs per day — keep the navigation simple; the top-3
    # families by size/impact claim a tab, the rest flow to the main lane
    # (with shared-storyline labels there).
    max_topic_tabs: 3
    # Lowered from 5 → 3: most storyline families had 1-3 members and spilled
    # into the main lane even when they shared a clear storyline_key. (Issue #2)
    min_items_per_topic: 3
    candidate_window: 40
    history_window_days: 5
    storyline_relation_batch_size: 8
    max_pair_candidates: 200
    storyline_blocker_similarity: 0.54
    storyline_blocker_title_overlap: 0.06
    storyline_edge_confidence_threshold: 0.50
    # Raised from 0.48 → 0.55 (Issue #4): tighter bar for reusing a historical
    # storyline_key, so a weak match can't claim a key that has since been
    # reassigned to an unrelated topic. Combined with content-derived keys.
    storyline_history_similarity_threshold: 0.55
    storyline_admission_similarity: 0.64
    storyline_admission_title_overlap: 0.06
    # Min mean pairwise centroid cosine for all members of a storyline family;
    # incoherent transitively-chained components are split below this bar.
    storyline_coherence_min: 0.60
    # Relaxed coherence bar for components whose members are glued by
    # same_conflict_different_event edges (different daily incidents of the
    # same ongoing conflict have low centroid similarity by design).
    # Issue #2 rec #3.
    storyline_conflict_coherence_min: 0.40
    cluster_validation_pair_similarity: 0.50
    cluster_validation_pair_title_overlap: 0.03
    cluster_validation_outlier_similarity: 0.58
    cluster_validation_outlier_title_overlap: 0.05
    tab_name_max_chars: 10
    icon_allowlist: ["globe", "war", "trade", "chip", "ai", "energy"]

# ─── ACTIVE SEARCH ────────────────────────────────────────────────────────────
active_search:
  telemetry_enabled: true
  result_max_age_hours: 72
  min_content_chars: 150
  max_results_per_region: 1
  max_regions_per_cluster: 3        # cap missing regions searched per cluster (RC-1)
  min_organic_sources_to_skip: 8   # skip seeker when cluster already has this many organic articles (RC-3)
  min_query_token_overlap: 0.34
  min_cluster_title_overlap: 0.08
  max_existing_title_overlap: 0.82
  allow_unknown_freshness_for_official: false
  search_profiles:
    us:
      language: en
    gb:
      language: en
    cn:
      language: zh
    jp:
      language: ja
    kr:
      language: ko
    ru:
      language: ru
    de:
      language: de
    fr:
      language: fr
    in:
      language: en
    ua:
      language: uk
    il:
      language: he
    sa:
      language: ar

