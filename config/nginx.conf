server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;
    charset utf-8;
    server_tokens off;

    # Security headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; script-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'; worker-src 'self'; manifest-src 'self';" always;

    # Serve latest report at root
    location = / {
        try_files /latest/index.html /index.html =404;
    }

    # Date-specific reports: /2026-02-21/
    # Quoted regex: avoids nginx block-parser conflict with {n} quantifiers
    location ~* "^/\d{4}-\d{2}-\d{2}/" {
        try_files $uri $uri/index.html =404;
    }

    # PWA manifest — no cache so updates are picked up immediately
    location = /manifest.json {
        add_header Cache-Control "no-cache";
        add_header Content-Type "application/manifest+json";
    }

    # Service worker — must be served from root scope, no cache
    location = /sw.js {
        add_header Cache-Control "no-cache";
        add_header Service-Worker-Allowed "/";
    }

    # Static assets
    location ~* \.(css|js|json|ico|png|svg)$ {
        expires 1d;
        add_header Cache-Control "public";
    }

    # No caching for HTML
    location ~* \.html$ {
        add_header Cache-Control "no-cache";
    }
}
