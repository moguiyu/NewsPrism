{% extends "base.html" %}{% block body %}
<h2>来源评估 · {{ date_from }} → {{ date_to }}</h2>
{% include "_filters.html" %}
<p class="muted">影响力贡献 = 该来源参与的已入选报道综合分之和。</p>
<table><tr><th>来源</th><th>影响力贡献</th><th>入选报道数</th></tr>
{% for s in review %}
<tr><td>{{ s.source }}</td><td>{{ '%.2f'|format(s.contribution) }}</td><td>{{ s.clusters }}</td></tr>
{% endfor %}</table>
{% endblock %}
