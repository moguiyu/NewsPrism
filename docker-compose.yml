services:

  # ── newsnow — Chinese news source aggregator ───────────────────────────────
  # Handles all hard Chinese news sources: undocumented APIs, GB2312 encoding,
  # anti-bot headers. Optional at the stack level, but strongly recommended if
  # you want the default full source catalog to work well.
  # Source: https://github.com/ourongxing/newsnow
  newsnow:
    image: ghcr.io/ourongxing/newsnow:latest
    container_name: newsnow
    restart: unless-stopped
    ports:
      - "127.0.0.1:3001:4444"   # localhost-only; newsprism reaches it via Docker network as newsnow:4444
    environment:
      - NUXT_PUBLIC_SITE_URL=http://newsnow:4444
      # GitHub OAuth (optional — only needed for user login feature)
      # - NUXT_GITHUB_CLIENT_ID=
      # - NUXT_GITHUB_CLIENT_SECRET=
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:4444/api/s?id=thepaper"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ── NewsPrism — pipeline (collect + cluster + summarize + publish) ──────────
  # Core service. Runs the long-lived scheduler and writes persistent state to
  # ./data and ./output.
  newsprism:
    build: .
    container_name: newsprism
    restart: unless-stopped
    env_file: .env
    environment:
      - NEWSNOW_BASE_URL=http://newsnow:4444    # internal Docker network endpoint
      - SCHEDULE_TIMEZONE=Europe/Warsaw         # overrides config.yaml schedule.timezone
    volumes:
      - ./data:/app/data                      # SQLite database (persistent)
      - ./output:/app/output                  # Generated HTML reports (persistent)
      - ./config:/app/config                  # User-editable config and source catalog
      - ./templates:/app/templates            # User-editable report templates
      - hf_cache:/app/.cache/huggingface      # Embedding model cache
    depends_on:
      newsnow:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    command: sh -c "umask 022 && python -m newsprism run"

  # ── nginx — static HTML report server ──────────────────────────────────────
  # Core for browser access. Put a reverse proxy with HTTPS in front of this
  # service if you plan to expose NewsPrism publicly on the internet.
  web:
    image: nginx:alpine
    container_name: newsprism-web
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./output:/usr/share/nginx/html:ro
      - ./config/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"

volumes:
  hf_cache:
