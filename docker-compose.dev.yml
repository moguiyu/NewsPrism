services:

  # ── newsnow — Chinese news source aggregator ───────────────────────────────
  # Handles all hard Chinese news sources: undocumented APIs, GB2312 encoding,
  # anti-bot headers. Optional at the stack level, but strongly recommended if
  # you want the default full source catalog to work well.
  # Source: https://github.com/ourongxing/newsnow
  newsnow:
    image: ghcr.io/ourongxing/newsnow:latest
    container_name: newsnow
    restart: unless-stopped
    ports:
      - "127.0.0.1:3001:4444"
    environment:
      - NUXT_PUBLIC_SITE_URL=http://newsnow:4444
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:4444/api/s?id=thepaper"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ── NewsPrism — source-build contributor stack ─────────────────────────────
  # Uses the local Dockerfile and bind mounts editable config/templates.
  newsprism:
    build: .
    container_name: newsprism
    restart: unless-stopped
    env_file: .env
    environment:
      - NEWSNOW_BASE_URL=http://newsnow:4444
      - SCHEDULE_TIMEZONE=Europe/Warsaw
    volumes:
      - ./data:/app/data
      - ./output:/app/output
      - ./config:/app/config
      - ./templates:/app/templates
      - hf_cache:/app/.cache/huggingface
    depends_on:
      newsnow:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    command: sh -c "umask 022 && python -m newsprism run"

  # ── admin quality portal — long-running management backend ─────────────────
  # Lets administrators inspect every article, the source pipeline, and cluster
  # selection from behind the stack, to judge news quality. Publicly reachable
  # at https://admin.grayzhang.com via Cloudflare Tunnel + Access (Email OTP).
  # Bound to 0.0.0.0:8081 so cloudflared (in a separate Docker network) can
  # reach it via the host LAN IP; the public path is still gated by Cloudflare
  # Access, and PORTAL_REQUIRE_CF_ACCESS (default true) blocks headerless
  # requests inside the LAN. SSH tunnel also still works.
  newsprism-portal:
    build: .
    image: newsprism-newsprism        # reuse the newsprism build
    container_name: newsprism-portal
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./data:/app/data
      - ./config:/app/config
      - ./templates:/app/templates
    ports:
      - "8081:8081"
    command: sh -c "python -m newsprism portal --host 0.0.0.0 --port 8081"

  # ── metabase — data analytics over the live SQLite (read-only) ─────────────
  # Self-hosted Metabase (official image). Reads the same data/newsprism.db the
  # portal does, read-only. Application metadata (accounts, dashboards) persists
  # in a bind-mounted H2 file. Publicly reachable at metabase.grayzhang.com via
  # the Cloudflare Tunnel + Access, same pattern as news/admin.
  metabase:
    image: metabase/metabase:latest
    container_name: newsprism-metabase
    restart: unless-stopped
    # Run as uid 1000 to match the newsprism container, which owns the SQLite
    # WAL/SHM sidecar files (data/newsprism.db-wal, -shm). SQLite's locking
    # requires the opener to own/share those files; running as root (the image
    # default) collides with the newsprism-owned WAL → "Permission denied".
    user: "1000:1000"
    environment:
      - MB_DB_TYPE=h2
      - MB_DB_FILE=/metabase-data/metabase.db
      - MB_SITE_URL=https://metabase.grayzhang.com
      - MB_JETTY_PORT=3100
    volumes:
      - ./data:/app/data                 # SQLite source — RW: SQLite needs to
                                         # create lock/journal sidecar files even
                                         # for read-only queries. Metabase is an
                                         # analytics tool and only issues SELECTs,
                                         # so it never writes the production data.
      - ./metabase-data:/metabase-data   # H2 app DB + config persistence
    ports:
      - "3100:3100"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:3100/api/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

  # ── nginx — static HTML report server ──────────────────────────────────────
  # Contributor stack keeps nginx config editable from the repo.
  web:
    image: nginx:alpine
    container_name: newsprism-web
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./output:/usr/share/nginx/html:ro
      - ./config/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"

volumes:
  hf_cache:
